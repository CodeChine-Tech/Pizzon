# Configuration for Pizzon Frontend
server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html/pizzon;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}

# Configuration for Pizzon Admin
server {
    listen 5174;
    server_name localhost;

    location /admin {
        alias /usr/share/nginx/html/admin/;
        index index.html index.htm;
        
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        return 301 http://$host:5174/admin/;
    }
}
